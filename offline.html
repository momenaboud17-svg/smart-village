<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Village - بدون إنترنت</title>
    <style>
        body {
            background: #0a0f1e;
            color: #e0e4f0;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .offline-card {
            background: rgba(10, 15, 30, 0.9);
            border-radius: 36px;
            padding: 40px;
            border: 1px solid #ffd966;
            max-width: 400px;
        }
        h1 {
            color: #ffd966;
        }
        p {
            color: #9aaec9;
            margin: 20px 0;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="icon">🏥</div>
        <h1>لا يوجد اتصال بالإنترنت</h1>
        <p>التطبيق لا يزال يعمل بوضع عدم الاتصال. بعض الميزات قد تكون محدودة.</p>
        <p style="color:#00ffc3;">✓ الماسح الضوئي يعمل ✓ التشخيص متاح</p>
    </div>
</body>
</html>
